name: Sync Agent Skill (subtree)

# Pulls a specific skill directory from a SOURCE registry repo (RepoA) into a
# target path in THIS repo (RepoB, where this workflow runs) using git subtree,
# then opens a PULL REQUEST against a provided base branch instead of pushing
# straight to it.
#
# Source is read anonymously (the source repo must be public on your internal
# GitHub). If it is NOT anonymously readable, use sync-skill-subtree-token.yml.

on:
  # Manual run with full control over which path/branch is synced.
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repo (RepoA), host/owner/repo.git. Leave blank to use SOURCE_REPO_URL env.'
        required: false
        type: string
      source_path:
        description: 'Path to the skill inside RepoA (e.g. registry/core/communication)'
        required: true
        type: string
      target_path:
        description: 'Where to place the skill in THIS repo (e.g. agents/skills/communication)'
        required: true
        type: string
      source_branch:
        description: 'Branch of the source registry to pull from'
        required: true
        default: 'main'
        type: string
      base_branch:
        description: 'Base branch in THIS repo to open the PR against. Blank = default branch.'
        required: false
        type: string

  # Lets RepoA trigger this automatically via a repository_dispatch webhook.
  # client_payload may carry { source_path, target_path, source_branch, base_branch }.
  repository_dispatch:
    types: [skills_updated]

# Default fallback for the source repo when no input/payload is provided.
env:
  SOURCE_REPO_URL: 'github.com/your-org/skill-registry.git'
  # Never fall back to an interactive credential prompt: any auth failure
  # errors out immediately instead of hanging/asking for a username.
  GIT_TERMINAL_PROMPT: '0'
  GIT_ASKPASS: ''
  GCM_INTERACTIVE: 'never'

# Don't let two syncs race.
concurrency:
  group: sync-skill-subtree-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # push the working branch
  pull-requests: write   # open the PR

jobs:
  sync-skill-path:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        id: cfg
        env:
          # workflow_dispatch inputs OR repository_dispatch client_payload, with env fallback.
          IN_SOURCE_REPO: ${{ inputs.source_repo }}
          IN_SOURCE_PATH: ${{ inputs.source_path }}
          IN_TARGET_PATH: ${{ inputs.target_path }}
          IN_SOURCE_BRANCH: ${{ inputs.source_branch }}
          IN_BASE_BRANCH: ${{ inputs.base_branch }}
          CP_SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          CP_SOURCE_PATH: ${{ github.event.client_payload.source_path }}
          CP_TARGET_PATH: ${{ github.event.client_payload.target_path }}
          CP_SOURCE_BRANCH: ${{ github.event.client_payload.source_branch }}
          CP_BASE_BRANCH: ${{ github.event.client_payload.base_branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          source_repo="${IN_SOURCE_REPO:-${CP_SOURCE_REPO:-$SOURCE_REPO_URL}}"
          source_path="${IN_SOURCE_PATH:-${CP_SOURCE_PATH:-}}"
          target_path="${IN_TARGET_PATH:-${CP_TARGET_PATH:-}}"
          source_branch="${IN_SOURCE_BRANCH:-${CP_SOURCE_BRANCH:-main}}"
          base_branch="${IN_BASE_BRANCH:-${CP_BASE_BRANCH:-${DEFAULT_BRANCH:-main}}}"

          : "${source_path:?source_path is required (input or client_payload)}"
          : "${target_path:?target_path is required (input or client_payload)}"

          # Strip any leading/trailing slashes so subtree prefixes are clean.
          source_path="${source_path#/}"; source_path="${source_path%/}"
          target_path="${target_path#/}"; target_path="${target_path%/}"

          # Unique, ref-safe working branch derived from the target path.
          # Map dots to '-' too: git forbids a branch component starting with '.'.
          slug="$(printf '%s' "$target_path" | tr -cs 'A-Za-z0-9_-' '-')"
          slug="${slug#-}"; slug="${slug%-}"
          work_branch="skills-sync/${slug}-${GITHUB_RUN_ID}"

          {
            echo "source_repo=$source_repo"
            echo "source_path=$source_path"
            echo "target_path=$target_path"
            echo "source_branch=$source_branch"
            echo "base_branch=$base_branch"
            echo "work_branch=$work_branch"
          } >> "$GITHUB_OUTPUT"

          echo "Sync plan: ${source_repo}#${source_branch}:${source_path} -> ${target_path}"
          echo "PR: ${work_branch} -> ${base_branch}"

      - name: Checkout target repo (RepoB) at the base branch
        uses: actions/checkout@v4
        with:
          # Open the PR against (and branch off of) the provided base branch.
          ref: ${{ steps.cfg.outputs.base_branch }}
          # Full history is required: subtree needs to find merge bases / replay commits.
          fetch-depth: 0
          # No custom token needed: the default GITHUB_TOKEN that checkout
          # configures can push the working branch and open a PR in THIS repo.
          # The source repo is read anonymously below.

      - name: Configure git identity
        run: |
          git config user.name  "skill-sync-bot"
          git config user.email "skill-sync-bot@users.noreply.github.com"

      - name: Create working branch
        id: branch
        env:
          WORK_BRANCH: ${{ steps.cfg.outputs.work_branch }}
        run: |
          set -euo pipefail
          base_sha="$(git rev-parse HEAD)"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          git switch -c "$WORK_BRANCH"
          echo "Created ${WORK_BRANCH} from ${base_sha}."

      - name: Add source registry remote
        env:
          SOURCE_REPO: ${{ steps.cfg.outputs.source_repo }}
        run: |
          set -euo pipefail
          # Public repo on internal GitHub — read it anonymously, no token.
          git remote add source-registry "https://${SOURCE_REPO}"
          echo "Remote 'source-registry' configured (anonymous)."

      - name: Fetch source branch
        env:
          SOURCE_BRANCH: ${{ steps.cfg.outputs.source_branch }}
        run: |
          set -euo pipefail
          echo "Fetching ${SOURCE_BRANCH} from source registry..."
          git fetch --no-tags source-registry "$SOURCE_BRANCH" \
            || { echo "::error::Cannot fetch '${SOURCE_BRANCH}' from the source repo. A 'could not read Username' error here means the source repo is not anonymously readable (it must be public on your internal GitHub); otherwise check SOURCE_REPO_URL and the branch name."; exit 1; }

      - name: Validate source path exists and is a directory
        env:
          SOURCE_PATH: ${{ steps.cfg.outputs.source_path }}
          SOURCE_BRANCH: ${{ steps.cfg.outputs.source_branch }}
        run: |
          set -euo pipefail
          ref="source-registry/${SOURCE_BRANCH}:${SOURCE_PATH}"
          if ! git cat-file -e "$ref" 2>/dev/null; then
            echo "::error::Path '${SOURCE_PATH}' not found in source-registry/${SOURCE_BRANCH}."
            exit 1
          fi
          type="$(git cat-file -t "$ref")"
          if [ "$type" != "tree" ]; then
            echo "::error::'${SOURCE_PATH}' is a ${type}, not a directory. Provide a directory path."
            exit 1
          fi
          echo "Validated: '${SOURCE_PATH}' is a directory in the source."

      - name: Split source path into a temporary branch
        id: split
        env:
          SOURCE_PATH: ${{ steps.cfg.outputs.source_path }}
          SOURCE_BRANCH: ${{ steps.cfg.outputs.source_branch }}
        run: |
          set -euo pipefail
          split_branch="skill-split-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          worktree="$(mktemp -d)/source-checkout"

          # `git subtree split` does a filesystem check that the --prefix dir
          # exists in the CURRENT working tree before it looks at the commit.
          # RepoB's checkout doesn't contain SOURCE_PATH (it lives only in the
          # fetched source ref), so run the split inside a throwaway worktree
          # checked out to that ref. Worktrees share the object DB, so the
          # resulting split branch is visible back in the main checkout.
          echo "Checking out source ref into a temporary worktree..."
          git worktree add -q --detach "$worktree" "source-registry/${SOURCE_BRANCH}"

          echo "Isolating history of '${SOURCE_PATH}' into ${split_branch}..."
          ( cd "$worktree" && git subtree split -q --prefix="$SOURCE_PATH" -b "$split_branch" )

          git worktree remove --force "$worktree"

          echo "split_branch=$split_branch" >> "$GITHUB_OUTPUT"

      - name: Add or merge the skill into the target path
        env:
          TARGET_PATH: ${{ steps.cfg.outputs.target_path }}
          SOURCE_PATH: ${{ steps.cfg.outputs.source_path }}
          SPLIT_BRANCH: ${{ steps.split.outputs.split_branch }}
        run: |
          set -euo pipefail
          if [ -d "$TARGET_PATH" ]; then
            echo "Target exists -> subtree merge (update)."
            git subtree merge \
              --prefix="$TARGET_PATH" \
              "$SPLIT_BRANCH" --squash \
              -m "chore(skills): sync ${SOURCE_PATH} -> ${TARGET_PATH}"
          else
            echo "Target missing -> subtree add (first import)."
            git subtree add \
              --prefix="$TARGET_PATH" \
              "$SPLIT_BRANCH" --squash \
              -m "chore(skills): import ${SOURCE_PATH} -> ${TARGET_PATH}"
          fi

      - name: Validate synced skill files
        env:
          TARGET_PATH: ${{ steps.cfg.outputs.target_path }}
        run: |
          set -euo pipefail
          if ls "$TARGET_PATH"/*.md >/dev/null 2>&1; then
            echo "Validation passed: markdown skill files present in ${TARGET_PATH}."
          else
            echo "::warning::No .md files found in ${TARGET_PATH}. Verify the source path payload."
          fi

      - name: Push working branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ steps.cfg.outputs.base_branch }}
          WORK_BRANCH: ${{ steps.cfg.outputs.work_branch }}
          BASE_SHA: ${{ steps.branch.outputs.base_sha }}
          SOURCE_REPO: ${{ steps.cfg.outputs.source_repo }}
          SOURCE_PATH: ${{ steps.cfg.outputs.source_path }}
          SOURCE_BRANCH: ${{ steps.cfg.outputs.source_branch }}
          TARGET_PATH: ${{ steps.cfg.outputs.target_path }}
        run: |
          set -euo pipefail
          # A --squash subtree op produces no commit when nothing changed.
          if git diff --quiet "$BASE_SHA" HEAD; then
            echo "No changes versus ${BASE_BRANCH}; nothing to sync. Skipping PR."
            exit 0
          fi

          echo "Pushing ${WORK_BRANCH}..."
          git push origin "HEAD:${WORK_BRANCH}"

          title="chore(skills): sync ${SOURCE_PATH} -> ${TARGET_PATH}"
          body="$(printf '%s\n' \
            "Automated skill sync via \`git subtree\`." \
            "" \
            "- source repo: \`${SOURCE_REPO}\`" \
            "- source path: \`${SOURCE_PATH}\` @ \`${SOURCE_BRANCH}\`" \
            "- target path: \`${TARGET_PATH}\`" \
            "- base branch: \`${BASE_BRANCH}\`" \
            "" \
            "Generated by the Sync Agent Skill workflow (run ${GITHUB_RUN_ID}).")"

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$WORK_BRANCH" \
            --title "$title" \
            --body "$body"

      - name: Clean up temporary split branch
        if: always() && steps.split.outputs.split_branch != ''
        run: git branch -D "${{ steps.split.outputs.split_branch }}" || true
